<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle with dark theme -->
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  
  <!-- Subtle border/glow -->
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  
  <!-- LV text, matching the font-display bold tracking-wider style -->
  <text
    x="32"
    y="44"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="2"
  >LV</text>
</svg>
